
apiVersion: apps/v1

kind: Deployment

metadata:

  name: rolling-app

  annotations:

    argocd.argoproj.io/sync-wave: "1"

spec:

  replicas: 4

  selector:

    matchLabels:

      app: rolling-app

  strategy:

    type: RollingUpdate

    rollingUpdate:

      maxSurge: 1        # one extra pod during update

      maxUnavailable: 0  # zero downtime

  template:

    metadata:

      labels:

        app: rolling-app

    spec:

      containers:

      - name: nginx

        image: nginx:1.20   # v1 stable

        ports:

        - containerPort: 80

        readinessProbe:

          httpGet:

            path: /

            port: 80

          initialDelaySeconds: 5

          periodSeconds: 5

        livenessProbe:

          httpGet:

            path: /

            port: 80

          initialDelaySeconds: 10

          periodSeconds: 10

